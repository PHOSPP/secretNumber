<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" src="./styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="text-align: center;"><strong>Secret Number game</strong></h1>
    <h2><strong>Try guessing the secret number from 1 to 100!</strong></h2>
    <script></script>
    <input id="inputNumero"type="number">
    <button onclick="valorChute()">Guess</button>
    <div id="janelaSeAcertou"></div>
    <p>Tries: <p id="tentativas">0</p> </p>
    <button onclick="restart()">Restart</button>
    <script type="module">
        import {exibirTentativas, valorChute, restart} from "./scripts.js";
        import {incrementarTentativas, gerarNumeroSecreto} from "./game.js";

        window.restart = restart;
        window.exibirTentativas = exibirTentativas;
        window.incrementarTentativas = incrementarTentativas;
        window.valorChute = valorChute;

        gerarNumeroSecreto();
    </script>
</body>
</html>
